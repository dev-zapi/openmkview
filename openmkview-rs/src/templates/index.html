<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMKView Rust</title>
    <script src="https://unpkg.com/htmx.org@2"></script>
    <script src="https://unpkg.com/alpinejs@3" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; background: #fff; }
        .activity-bar { width: 48px; background: #333; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .activity-bar button { width: 40px; height: 40px; margin-bottom: 8px; background: transparent; border: none; color: #ccc; cursor: pointer; border-radius: 5px; font-size: 20px; }
        .activity-bar button:hover { background: #444; color: #fff; }
        .sidebar { width: 250px; background: #252526; color: #ccc; display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px; background: #2d2d30; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 0 10px; }
        .btn { padding: 8px 16px; background: #0e639c; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 13px; width: 100%; margin-bottom: 10px; }
        .btn:hover { background: #1177bb; }
        .file-tree ul { list-style: none; padding-left: 0; }
        .file-tree li { margin: 2px 0; }
        .file-tree .item { display: flex; align-items: center; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 13px; }
        .file-tree .item:hover { background: #37373d; }
        .file-tree .item.selected { background: #37373d; color: #fff; }
        .file-tree .folder-children { padding-left: 18px; display: none; }
        .file-tree .folder-children.show { display: block; }
        .file-tree .icon { margin-right: 6px; width: 16px; text-align: center; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .main-header { padding: 10px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .tabs { display: flex; }
        .tab { padding: 8px 16px; cursor: pointer; border-right: 1px solid #ddd; }
        .tab.active { background: #fff; font-weight: 500; }
        .main-content { flex: 1; overflow-y: auto; padding: 20px; }
        .markdown-body { max-width: 900px; margin: 0 auto; line-height: 1.6; }
        .markdown-body h1 { margin-top: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; }
        .markdown-body code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .welcome { text-align: center; padding: 60px 20px; color: #666; }
        .loading { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body>
    <div class="activity-bar">
        <button title="Explorer">📁</button>
        <button title="Git">🌿</button>
        <button title="Settings">⚙️</button>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-header">资源管理器</div>
        <div class="sidebar-content">
            <button class="btn" onclick="openProject()">📂 打开项目</button>
            <div id="projects" class="loading">加载中...</div>
            <div id="file-tree" class="file-tree" style="margin-top: 15px;"></div>
        </div>
    </div>
    
    <div class="main">
        <div class="main-header">
            <div class="tabs">
                <div class="tab active">预览</div>
                <div class="tab">源码</div>
            </div>
            <div id="file-name" style="font-size: 12px; color: #666;"></div>
        </div>
        <div class="main-content" id="content">
            <div class="welcome">
                <h1>OpenMKView Rust</h1>
                <p>点击"打开项目"开始使用</p>
            </div>
        </div>
    </div>
    
    <script>
        let activeProject = null;
        let fileTree = [];
        
        async function loadProjects() {
            const res = await fetch('/api/projects');
            const projects = await res.json();
            const el = document.getElementById('projects');
            if (projects.length === 0) {
                el.innerHTML = '<p style="font-size:12px;color:#666;margin-top:10px;">暂无项目</p>';
            } else {
                el.innerHTML = projects.map(p => 
                    `<div class="item" style="padding:4px 8px;margin:4px 0;cursor:pointer;border-radius:3px;" onclick="switchProject(${p.id}, '${p.name}')">📁 ${p.name}</div>`
                ).join('');
            }
        }
        
        async function openProject() {
            const path = prompt('项目目录路径:');
            if (!path) return;
            const res = await fetch('/api/projects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({path})
            });
            const project = await res.json();
            loadProjects();
            setTimeout(() => switchProject(project.id, project.name), 100);
        }
        
        async function switchProject(id, name) {
            activeProject = {id, name};
            document.getElementById('file-name').textContent = name;
            const res = await fetch('/api/files/tree?project_id=' + id);
            fileTree = await res.json();
            renderFileTree();
        }
        
        function renderFileTree() {
            const el = document.getElementById('file-tree');
            el.innerHTML = '<ul>' + renderNodes(fileTree) + '</ul>';
        }
        
        function renderNodes(nodes) {
            return nodes.map(node => {
                if (node.isFolder) {
                    const children = node.children ? renderNodes(node.children) : '';
                    return `<li>
                        <div class="item" onclick="this.nextElementSibling.classList.toggle('show')">📁 ${node.name}</div>
                        <div class="folder-children"><ul>${children}</ul></div>
                    </li>`;
                } else {
                    return `<li><div class="item" onclick="loadFile('${node.path}', '${node.name}')">📄 ${node.name}</div></li>`;
                }
            }).join('');
        }
        
        async function loadFile(path, name) {
            document.getElementById('file-name').textContent = name;
            const res = await fetch('/api/files/content?path=' + encodeURIComponent(path) + '&project_id=' + activeProject.id);
            const data = await res.json();
            document.getElementById('content').innerHTML = '<div class="markdown-body">' + (data.html || data.content) + '</div>';
        }
        
        loadProjects();
    </script>
</body>
</html>
