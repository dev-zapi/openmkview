<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>OpenMKView</title><script src="https://unpkg.com/htmx.org@2"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;height:100vh;display:flex}.sidebar{width:250px;background:#252526;color:#fff;padding:10px}.btn{padding:8px 16px;background:#0e639c;color:#fff;border:none;cursor:pointer;width:100%;margin-bottom:10px}.main{flex:1;display:flex;flex-direction:column}.header{padding:10px 20px;background:#f5f5f5;border-bottom:1px solid #ddd}.content{flex:1;overflow:auto;padding:20px}.markdown-body{max-width:900px;margin:0 auto;line-height:1.6}.markdown-body h1{margin-top:2em;border-bottom:1px solid #eaecef;padding-bottom:.3em}.markdown-body pre{background:#f6f8fa;padding:16px;border-radius:6px}.markdown-body code{background:#f6f8fa;padding:.2em .4em;font-family:monospace}.markdown-body pre code{background:transparent;padding:0}.markdown-body blockquote{border-left:4px solid #dfe2e5;padding-left:1em;color:#6a737d}.markdown-body table{border-collapse:collapse;width:100%;margin:1em 0}.markdown-body th,.markdown-body td{border:1px solid #dfe2e5;padding:6px 13px}.markdown-body tr:nth-child(2n){background:#f6f8fa}.item{padding:4px 8px;margin:4px 0;cursor:pointer;border-radius:3px}.item:hover{background:#37373d}.children{padding-left:18px;display:none}.children.show{display:block}.welcome{text-align:center;padding:60px;color:#666}</style></head>
<body><div class="sidebar"><button class="btn" onclick="openProject()">📂 打开项目</button><div id="projects">加载中...</div><div id="file-tree" style="margin-top:15px"></div></div>
<div class="main"><div class="header" id="header">OpenMKView Rust</div><div class="content" id="content"><div class="welcome"><h1>欢迎使用 OpenMKView Rust</h1><p>点击"打开项目"开始</p></div></div></div>
<script>let pid=null;async function loadProjects(){const r=await fetch('/api/projects');const ps=await r.json();document.getElementById('projects').innerHTML=ps.length?ps.map(p=>`<div class="item" onclick="loadTree(${p.id},'${p.name.replace(/'/g,"\\'")}')">📁 ${p.name}</div>`).join(''):'<p style="margin-top:10px;color:#999">暂无项目</p>'}async function openProject(){const path=prompt('目录路径:');if(!path)return;await fetch('/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});loadProjects()}async function loadTree(id,name){pid=id;document.getElementById('header').textContent=name;const r=await fetch('/api/files/tree?project_id='+id);const tree=await r.json();document.getElementById('file-tree').innerHTML='<ul>'+render(tree)+'</ul>'}function render(nodes){return nodes.map(n=>{if(n.isFolder){const c=n.children?render(n.children):'';return `<li><div class="item" onclick="this.nextElementSibling.classList.toggle('show')">📁 ${n.name}</div><div class="children"><ul>${c}</ul></div></li>`}return `<li><div class="item" onclick="loadFile('${n.path.replace(/'/g,"\\'")}','${n.name.replace(/'/g,"\\'")}')">📄 ${n.name}</div></li>`}).join('')}async function loadFile(path,name){document.getElementById('header').textContent=name;const r=await fetch('/api/files/content?path='+encodeURIComponent(path)+'&project_id='+pid);const d=await r.json();document.getElementById('content').innerHTML='<div class="markdown-body">'+(d.html||d.content)+'</div>'}loadProjects()</script></body></html>
