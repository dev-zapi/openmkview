<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>OpenMKView</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://unpkg.com/htmx.org@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;height:100vh;display:flex;overflow:hidden}
.activity-bar{width:48px;background:#333;display:flex;flex-direction:column;align-items:center;padding-top:10px;flex-shrink:0}
.activity-bar button{width:40px;height:40px;margin-bottom:8px;background:transparent;border:none;color:#ccc;cursor:pointer;border-radius:5px;font-size:18px}
.activity-bar button:hover{background:#444;color:#fff}
.sidebar{width:250px;background:#252526;color:#fff;display:flex;flex-direction:column;flex-shrink:0;min-width:150px;max-width:500px}
.sidebar-header{padding:10px;background:#2d2d30;font-weight:bold;font-size:11px;text-transform:uppercase;display:flex;justify-content:space-between}
.sidebar-content{flex:1;overflow-y:auto;padding:0 10px}
.resize-handle{width:4px;background:#1e1e1e;cursor:col-resize;flex-shrink:0;z-index:100}
.resize-handle:hover{background:#0e639c}
.btn{padding:8px 16px;background:#0e639c;color:#fff;border:none;cursor:pointer;border-radius:3px;font-size:13px;width:100%;margin-bottom:10px}
.btn:hover{background:#1177bb}
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff}
.header{padding:10px 20px;background:#f5f5f5;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.content{flex:1;overflow:auto;padding:20px}
.markdown-body{max-width:900px;margin:0 auto;line-height:1.6}
.markdown-body h1{margin-top:2em;border-bottom:1px solid #eaecef;padding-bottom:.3em;font-size:2em}
.markdown-body h2{margin-top:1.5em;font-size:1.5em}
.markdown-body h3{margin-top:1.25em;font-size:1.25em}
.markdown-body pre{margin:1em 0}
.markdown-body code{background:#f6f8fa;padding:.2em .4em;border-radius:3px;font-family:'SF Mono',Monaco,monospace;font-size:85%}
.markdown-body pre code{background:transparent;padding:0;font-size:100%}
.markdown-body blockquote{border-left:4px solid #dfe2e5;padding-left:1em;color:#6a737d;margin:1em 0}
.markdown-body table{border-collapse:collapse;width:100%;margin:1em 0}
.markdown-body th,.markdown-body td{border:1px solid #dfe2e5;padding:6px 13px}
.markdown-body tr:nth-child(2n){background:#f6f8fa}
.markdown-body ul,.markdown-body ol{margin:1em 0;padding-left:2em}
.markdown-body a{color:#0366d6;text-decoration:none}
.markdown-body a:hover{text-decoration:underline}
.markdown-body img{max-width:100%}
.markdown-body hr{border:0;border-top:1px solid #eaecef;margin:1.5em 0}
.item{padding:4px 8px;margin:4px 0;cursor:pointer;border-radius:3px;display:flex;align-items:center}
.item:hover{background:#37373d}
.item.selected{background:#37373d;color:#fff}
.icon{margin-right:6px;width:16px;text-align:center}
.children{padding-left:18px;display:none}
.children.show{display:block}
.welcome{text-align:center;padding:60px;color:#666}
.tabs{display:flex;border:1px solid #ddd;background:#fff;border-radius:4px}
.tab{padding:4px 12px;cursor:pointer;font-size:12px;border-radius:3px}
.tab:hover{background:#e8e8e8}
.tab.active{background:#0e639c;color:#fff}
.git-panel{background:#252526;border-top:1px solid #333;padding:10px;max-height:200px;overflow-y:auto;display:none}
.git-panel.show{display:block}
.git-status{font-size:11px;line-height:1.8}
.git-status .modified{color:#dcb67a}
.git-status .added{color:#73c991}
.git-status .deleted{color:#f48771}
.git-status .untracked{color:#7fb5ff}
.section-title{font-size:11px;text-transform:uppercase;color:#666;margin:15px 0 5px}
.dialog{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:1000}
.dialog.show{display:flex}
.dialog-content{background:#252526;border-radius:6px;padding:20px;min-width:400px;max-width:600px}
.dialog-content h3{margin-bottom:15px;color:#fff}
.dialog-content input,.dialog-content textarea{width:100%;padding:8px;background:#3c3c3c;border:1px solid #555;color:#fff;border-radius:3px;margin-bottom:10px}
.dialog-content button{padding:8px 16px;margin-right:10px;border:none;border-radius:3px;cursor:pointer}
.dialog-content .btn-primary{background:#0e639c;color:#fff}
.dialog-content .btn-secondary{background:#555;color:#fff}
</style></head>
<body>
<div class="activity-bar">
<button title="Explorer" style="color:#fff">📁</button>
<button title="Git" onclick="toggleGitPanel()">🌿</button>
<button title="Settings" onclick="showSettings()">⚙️</button>
</div>
<div class="sidebar" id="sidebar">
<div class="sidebar-header"><span>资源管理器</span><span style="cursor:pointer" onclick="toggleSidebar()">⋮</span></div>
<div class="sidebar-content">
<button class="btn" onclick="openProject()">📂 打开项目</button>
<div class="section-title">打开的项目</div>
<div id="projects"></div>
<div class="section-title" style="margin-top:15px">文件</div>
<div id="file-tree"></div>
</div>
<div class="git-panel" id="git-panel">
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
<span style="font-weight:bold;color:#fff;font-size:12px">Git</span>
<button onclick="refreshGit()" style="background:none;border:none;color:#ccc;cursor:pointer">⟳</button>
</div>
<div id="git-status"></div>
<div style="margin-top:10px">
<button class="btn" onclick="gitAdd()">Stage All</button>
<button class="btn" onclick="gitCommit()">Commit</button>
<button class="btn" onclick="gitPush()">Push</button>
<button class="btn" onclick="gitPull()">Pull</button>
</div>
</div>
</div>
<div class="resize-handle" id="resize-handle"></div>
<div class="main">
<div class="header">
<div class="tabs">
<div class="tab active" onclick="setMode('preview')" id="tab-preview">预览</div>
<div class="tab" onclick="setMode('source')" id="tab-source">源码</div>
<div class="tab" onclick="setMode('diff')" id="tab-diff" style="display:none">Diff</div>
</div>
<span id="file-name" style="font-size:12px;color:#666"></span>
</div>
<div class="content" id="content">
<div class="welcome"><h1>欢迎使用 OpenMKView Rust</h1><p style="margin-top:20px">点击"打开项目"选择一个 Markdown 目录开始使用</p>
<div style="margin-top:40px;text-align:left;display:inline-block;line-height:2;color:#999">✨ 功能特性：<br>📁 项目管理 - 打开本地目录<br>📄 Markdown 预览 - 实时渲染带语法高亮<br>🌿 Git 集成 - 版本控制<br>⚡ 快速 - Rust 驱动</div></div>
</div>
</div>
<div class="dialog" id="settings-dialog" onclick="if(event.target===this)hideSettings()">
<div class="dialog-content">
<h3>设置</h3>
<label style="color:#ccc;font-size:12px">Markdown 宽度</label>
<select id="md-width" style="width:100%;padding:8px;background:#3c3c3c;border:1px solid #555;color:#fff;border-radius:3px;margin-bottom:15px">
<option value="full">全宽</option>
<option value="70%">70%</option>
<option value="800px">800px</option>
<option value="900px">900px</option>
</select>
<div style="text-align:right"><button class="btn-primary" style="padding:8px 16px;border:none;border-radius:3px;cursor:pointer;color:#fff" onclick="saveSettings()">保存</button><button class="btn-secondary" style="padding:8px 16px;border:none;border-radius:3px;cursor:pointer;margin-left:10px" onclick="hideSettings()">取消</button></div>
</div>
</div>
<div class="dialog" id="commit-dialog" onclick="if(event.target===this)hideCommit()">
<div class="dialog-content">
<h3>Git Commit</h3>
<textarea id="commit-msg" rows="5" placeholder="输入提交信息..."></textarea>
<div style="text-align:right"><button class="btn-primary" style="padding:8px 16px;border:none;border-radius:3px;cursor:pointer;color:#fff" onclick="doCommit()">提交</button><button class="btn-secondary" style="padding:8px 16px;border:none;border-radius:3px;cursor:pointer;margin-left:10px" onclick="hideCommit()">取消</button></div>
</div>
</div>
<script>
let pid=null,fileTree=[],activeFile=null,mode='preview',sidebarWidth=250;
const resizeHandle=document.getElementById('resize-handle');
let isResizing=false;
resizeHandle.addEventListener('mousedown',e=>{isResizing=true;document.body.style.cursor='col-resize'});
document.addEventListener('mousemove',e=>{if(!isResizing)return;sidebarWidth=Math.max(150,Math.min(500,e.clientX-48));document.getElementById('sidebar').style.width=sidebarWidth+'px'});
document.addEventListener('mouseup',()=>{isResizing=false;document.body.style.cursor=''});
function toggleGitPanel(){document.getElementById('git-panel').classList.toggle('show')}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('show')}
function setMode(m){mode=m;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+m).classList.add('active');if(activeFile&&m==='diff')loadDiff()}
function showSettings(){document.getElementById('settings-dialog').classList.add('show')}
function hideSettings(){document.getElementById('settings-dialog').classList.remove('show')}
function saveSettings(){const w=document.getElementById('md-width').value;document.querySelector('.markdown-body').style.maxWidth=w==='full'?'none':w;localStorage.setItem('mdWidth',w);hideSettings()}
function hideCommit(){document.getElementById('commit-dialog').classList.remove('show')}
async function loadProjects(){try{const r=await fetch('/api/projects');const ps=await r.json();const el=document.getElementById('projects');el.innerHTML=ps.length?ps.map(p=>`<div class="item" onclick="loadTree(${p.id},'${escapeHtml(p.name)}')"><span class="icon">📁</span>${escapeHtml(p.name)}</div>`).join(''):'<p style="margin-top:10px;color:#999;font-size:12px">暂无项目</p>'}catch(e){console.error(e)}}
async function openProject(){const path=prompt('目录路径:');if(!path)return;try{await fetch('/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})});loadProjects()}catch(e){alert('失败：'+e)}}
async function loadTree(id,name){pid=id;document.getElementById('file-name').textContent=name+' (project)';try{const r=await fetch('/api/files/tree?project_id='+id);fileTree=await r.json();document.getElementById('file-tree').innerHTML='<ul>'+renderTree(fileTree)+'</ul>'}catch(e){console.error(e)}}
function renderTree(nodes){return nodes.map(n=>{if(n.isFolder){const c=n.children?renderTree(n.children):'';return`<li><div class="item" onclick="this.nextElementSibling.classList.toggle('show')"><span class="icon">📁</span>${escapeHtml(n.name)}</div><div class="children"><ul>${c}</ul></div></li>`}return`<li><div class="item" onclick="loadFile('${escapeAttr(n.path)}','${escapeAttr(n.name)}')"><span class="icon">📄</span>${escapeHtml(n.name)}</div></li>`}).join('')}
async function loadFile(path,name){activeFile=path;document.getElementById('file-name').textContent=name;document.getElementById('tab-diff').style.display='block';try{const r=await fetch('/api/files/content?path='+encodeURIComponent(path)+'&project_id='+pid);const d=await r.json();renderContent(d.html||d.content,mode)}catch(e){alert('加载失败')}}
function renderContent(html,mode){const el=document.getElementById('content');if(mode==='preview'){el.innerHTML='<div class="markdown-body">'+html+'</div>';const w=localStorage.getItem('mdWidth')||'900px';document.querySelector('.markdown-body').style.maxWidth=w==='full'?'none':w;setTimeout(()=>{document.querySelectorAll('pre code').forEach(block=>{hljs.highlightElement(block)});},0)}else if(mode==='source'){el.innerHTML='<pre style="background:#f6f8fa;padding:16px;border-radius:6px;overflow-x:auto"><code style="background:transparent"></code></pre>';setTimeout(()=>{const code=el.querySelector('code');code.textContent=activeFile?document.getElementById('content').innerText:'';hljs.highlightElement(code);},0)}else if(mode==='diff'){el.innerHTML='<div class="loading">加载 diff...</div>';loadDiff()}}
async function loadDiff(){try{const r=await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'diff',project_id:pid,file_path:activeFile})});const d=await r.json();const el=document.getElementById('content');if(d.diff){el.innerHTML='<pre style="background:#f6f8fa;padding:16px;border-radius:6px;overflow-x:auto;font-family:monospace;font-size:12px">'+escapeHtml(d.diff)+'</pre>'}else{el.innerHTML='<div class="welcome"><p>无更改</p></div>'}}catch(e){console.error(e)}}
async function refreshGit(){if(!pid)return;try{const r=await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'status',project_id:pid})});const s=await r.json();const el=document.getElementById('git-status');if(s.files&&s.files.length){el.innerHTML='<div style="font-size:11px;color:#999;margin-bottom:5px">分支：'+s.branch+'</div>'+s.files.map(f=>{let cls=f.index==='?'?'untracked':f.index==='A'?'added':f.index==='D'?'deleted':'modified';return`<div class="git-status ${cls}">${f.index==='?'?'U':f.index} ${escapeHtml(f.path)}</div>`}).join('')}else{el.innerHTML='<div style="color:#999;font-size:12px">无更改</div>'}}catch(e){console.error(e)}}
async function gitAdd(){if(!pid)return;try{await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'add',project_id:pid})});refreshGit()}catch(e){alert('失败')}}
async function gitCommit(){if(!pid)return;document.getElementById('commit-dialog').classList.add('show')}
async function doCommit(){const msg=document.getElementById('commit-msg').value;if(!msg){alert('请输入提交信息');return}try{await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'commit',project_id:pid,message:msg})});hideCommit();refreshGit();document.getElementById('commit-msg').value=''}catch(e){alert('失败：'+e)}}
async function gitPush(){if(!pid)return;try{await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'push',project_id:pid})});alert('Push 成功')}catch(e){alert('失败：'+e)}}
async function gitPull(){if(!pid)return;try{await fetch('/api/git',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'pull',project_id:pid})});alert('Pull 成功');refreshGit()}catch(e){alert('失败：'+e)}}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeAttr(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
loadProjects();
</script></body></html>
