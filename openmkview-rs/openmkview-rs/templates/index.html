<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMKView Rust</title>
    <script src="https://unpkg.com/htmx.org@2"></script>
    <script src="https://unpkg.com/alpinejs@3" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        /* Activity Bar */
        .activity-bar { width: 48px; background: #333; display: flex; flex-direction: column; align-items: center; padding-top: 10px; }
        .activity-bar button { width: 40px; height: 40px; margin-bottom: 8px; background: transparent; border: none; color: #ccc; cursor: pointer; border-radius: 5px; font-size: 20px; }
        .activity-bar button:hover { background: #444; color: #fff; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #252526; color: #ccc; display: flex; flex-direction: column; }
        .sidebar-header { padding: 10px; background: #2d2d30; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 0 10px; }
        .btn { padding: 8px 16px; background: #0e639c; color: white; border: none; cursor: pointer; border-radius: 3px; font-size: 13px; }
        .btn:hover { background: #1177bb; }
        
        /* File Tree */
        .file-tree { margin-top: 10px; }
        .file-tree ul { list-style: none; padding-left: 0; }
        .file-tree li { margin: 2px 0; }
        .file-tree a { color: #ccc; text-decoration: none; display: block; padding: 4px 8px; cursor: pointer; border-radius: 3px; font-size: 13px; }
        .file-tree a:hover { background: #37373d; color: #fff; }
        .file-tree .folder { cursor: pointer; padding: 4px 8px; }
        .file-tree .folder:hover { background: #37373d; }
        .file-tree .folder-children { padding-left: 18px; display: none; }
        .file-tree .folder-children.show { display: block; }
        .file-tree .icon { margin-right: 6px; }
        
        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .main-header { padding: 10px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .main-content { flex: 1; overflow-y: auto; padding: 20px; }
        .markdown-body { max-width: 900px; margin: 0 auto; line-height: 1.6; }
        .markdown-body h1 { margin-bottom: 0.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
        .markdown-body code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body blockquote { border-left: 4px solid #dfe2e5; padding-left: 1em; color: #6a737d; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #dfe2e5; padding: 6px 13px; }
        .markdown-body tr:nth-child(2n) { background: #f6f8fa; }
        
        /* Welcome */
        .welcome { text-align: center; padding: 60px 20px; color: #666; }
        .welcome h1 { font-size: 2.5em; margin-bottom: 20px; color: #333; }
        .welcome p { font-size: 1.2em; margin-bottom: 30px; }
        
        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid #ddd; background: #f5f5f5; }
        .tab { padding: 8px 16px; cursor: pointer; border-right: 1px solid #ddd; font-size: 13px; }
        .tab:hover { background: #e8e8e8; }
        .tab.active { background: #fff; border-bottom: 2px solid #fff; margin-bottom: -1px; }
        
        /* Loading */
        .loading { text-align: center; padding: 20px; color: #999; }
    </style>
</head>
<body x-data="{ 
    activeTab: 'preview',
    selectedFile: null,
    fileContent: '',
    fileName: '',
    projects: [],
    fileTree: [],
    showGitPanel: false
}">
    <!-- Activity Bar -->
    <div class="activity-bar">
        <button title="Explorer" style="color: #fff;">📁</button>
        <button title="Search">🔍</button>
        <button title="Git" @click="showGitPanel = !showGitPanel">🌿</button>
        <button title="Settings" @click="$dispatch('open-settings')">⚙️</button>
    </div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <span x-text="selectedFile ? '文件' : '资源管理器'"></span>
        </div>
        <div class="sidebar-content">
            <button class="btn" style="width: 100%; margin-bottom: 10px;"
                    @click="$dispatch('open-project')">
                📂 打开项目
            </button>
            
            <div id="projects" 
                 hx-get="/api/projects" 
                 hx-trigger="load, refreshProjects from:body"
                 hx-on::after-request="projects = JSON.parse(event.detail.xhr.responseText)">
                <p style="font-size: 12px; color: #666;">加载中...</p>
            </div>
            
            <div id="file-tree" class="file-tree"
                 hx-get="/api/files/tree?project_id=1"
                 hx-trigger="loadFileTree from:body"
                 hx-on::after-request="fileTree = JSON.parse(event.detail.xhr.responseText)">
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main">
        <div class="main-header">
            <div class="tabs">
                <div class="tab" :class="{ active: activeTab === 'preview' }" 
                     @click="activeTab = 'preview'">预览</div>
                <div class="tab" :class="{ active: activeTab === 'source' }" 
                     @click="activeTab = 'source'">源码</div>
            </div>
            <div style="font-size: 12px; color: #666;">
                <span x-text="fileName || '未选择文件'"></span>
            </div>
        </div>
        
        <div class="main-content">
            <template x-if="!selectedFile">
                <div class="welcome">
                    <h1>欢迎使用 OpenMKView Rust</h1>
                    <p>点击"打开项目"选择一个 Markdown 目录开始使用</p>
                    <div style="margin-top: 40px; text-align: left; display: inline-block;">
                        <h3 style="margin-bottom: 15px;">API 端点:</h3>
                        <ul style="line-height: 2;">
                            <li>GET /api/projects - 获取项目列表</li>
                            <li>POST /api/projects - 创建项目</li>
                            <li>GET /api/files/tree?project_id=1 - 获取文件树</li>
                            <li>GET /api/files/content?path=README.md&project_id=1 - 获取文件内容</li>
                            <li>POST /api/git - Git 操作</li>
                            <li>GET/PUT /api/settings - 设置管理</li>
                        </ul>
                    </div>
                </div>
            </template>
            
            <template x-if="selectedFile">
                <div class="markdown-body" id="markdown-viewer">
                    <template x-if="activeTab === 'preview'">
                        <div x-html="fileContent"></div>
                    </template>
                    <template x-if="activeTab === 'source'">
                        <pre><code x-text="fileContent"></code></pre>
                    </template>
                </div>
            </template>
        </div>
    </div>
</body>
</html>
