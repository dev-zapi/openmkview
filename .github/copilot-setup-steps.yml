# Copilot Setup Steps
# Pre-installs dependencies for Copilot coding agent environment

name: "Copilot Setup Steps"

on: copilot_setup_steps

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
